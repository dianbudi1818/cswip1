let cur=0,start=0,score=0,ans={},detail={};

function isCorrectAnswer(q, idx){
 const correct=Array.isArray(q.a)? q.a : [q.a];
 return correct.includes(idx);
}

function correctLabel(q){
 return q.correctText || (Array.isArray(q.a) ? q.a.map(i=>q.o[i]).join(" / ") : q.o[q.a]);
}


function updateTopStats(){
 let correct=0,falsev=0,blank=0;
 for(let i=0;i<qs.length;i++){
   if(ans[i]===undefined) blank++;
   else if(isCorrectAnswer(qs[i], ans[i])) correct++;
   else falsev++;
 }
 const pct=Math.round((correct/qs.length)*100)||0;
 const c=document.getElementById('correctCnt'); if(c) c.innerText=correct;
 const f=document.getElementById('falseCnt'); if(f) f.innerText=falsev;
 const b=document.getElementById('blankCnt'); if(b) b.innerText=blank;
 const p=document.getElementById('pctTop'); if(p) p.innerText=pct;

 let h='';
 let pageStart=Math.floor(cur/10)*10;
 for(let i=pageStart;i<Math.min(pageStart+10,qs.length);i++){
   let cls='num ';
   if(ans[i]==undefined) cls+='unanswered';
   else cls+=(isCorrectAnswer(qs[i], ans[i])?'correct':'wrong');
   if(i==cur) cls+=' current';
   h+=`<button class="${cls}" onclick="gotoQ(${i})">${i+1}</button>`;
 }
 const nav=document.getElementById('navTop');
 if(nav) nav.innerHTML=h;
}

function renderNav(){
 let h="";
 for(let i=start;i<Math.min(start+10,qs.length);i++){
   let cls="num ";
   if(ans[i]==undefined) cls+="unanswered";
   else cls+=(isCorrectAnswer(qs[i], ans[i])?"correct":"wrong");
   if(i==cur) cls+=" current";
   h+=`<button class="${cls}" onclick="gotoQ(${i})">${i+1}</button>`;
 }
 const navEl=document.getElementById("nav"); if(navEl) navEl.innerHTML=h;
}

function draw(){
 const total=qs.length;
 document.getElementById("question").innerHTML=`<div class="q-header"><div class="q-num-badge">${cur+1}</div><h3 style="margin:0;font-size:16px;line-height:1.5">${qs[cur].q}</h3></div>`;
 document.getElementById("options").innerHTML=qs[cur].o.map((x,i)=>`<button class='option' onclick='pick(${i})'>${x}</button>`).join("");
 document.getElementById("result").innerHTML=detail[cur]||"";
 renderNav();updateTopStats();
}

function pick(i){
 if(ans[cur]==undefined){ans[cur]=i;if(isCorrectAnswer(qs[cur], i))score++;}
 const q=qs[cur];
 const keys=['A','B','C','D','E','F'];
 const isCorrect=isCorrectAnswer(q, i);

 // Build chosen wrong answer block (only if wrong)
 let chosenWrongBlock='';
 if(!isCorrect){
  const chosenText=q.o[i].replace(/^[A-F]\.\s*/,'');
  const chosenReason=q.w&&q.w[i]?q.w[i]:'Bukan jawaban yang paling tepat untuk konteks ini.';
  chosenWrongBlock=`
  <div style="background:#fff0f0;border-left:4px solid #dc3545;padding:10px 14px;margin-bottom:0">
   <div style="font-weight:bold;color:#dc3545;margin-bottom:4px">❌ Jawaban Anda Salah: ${keys[i]}. ${chosenText}</div>
   <div style="color:#666;font-size:13px">${chosenReason}</div>
  </div>`;
 }

 // Correct answer block
 const correctBlock=`
  <div style="background:#f0fff4;border-left:4px solid #28a745;padding:10px 14px;margin-bottom:0">
   <div style="font-weight:bold;color:#28a745;margin-bottom:4px">✅ Jawaban Benar: ${correctLabel(q)}</div>
   <div style="color:#333;font-size:13px">${q.exp}</div>
  </div>`;

 // Remaining wrong options (excluding chosen and correct)
 let remainingRows='';
 q.o.forEach((opt,idx)=>{
  if(isCorrectAnswer(q, idx)) return;
  if(!isCorrect && idx===i) return; // already shown above
  const label=keys[idx];
  const reason=q.w&&q.w[idx]?q.w[idx]:'Bukan jawaban yang paling tepat untuk konteks ini.';
  const optText=opt.replace(/^[A-F]\.\s*/,'');
  remainingRows+=`<div style="padding:6px 14px;border-top:1px solid #eee">
   <span style="font-weight:bold;color:#dc3545">${label}. ${optText}</span><br>
   <span style="color:#888;font-size:13px">${reason}</span>
  </div>`;
 });

 const remainingBlock=remainingRows?`
  <div style="background:#fff8f8;padding:6px 0">
   <div style="padding:6px 14px;font-weight:bold;color:#dc3545;font-size:13px">Opsi lain yang salah:</div>
   ${remainingRows}
  </div>`:'';

 const translationBlock=q.t?`
  <div style="background:#fffde7;border-left:4px solid #f9a825;padding:10px 14px;margin-bottom:0">
   <div style="font-weight:bold;color:#f57f17;margin-bottom:3px;font-size:12px">📝 ARTI / MAKSUD SOAL:</div>
   <div style="color:#444;font-size:13px;font-style:italic">${q.t}</div>
  </div>`:'';

 detail[cur]=`
 <div style="border:1px solid #ccc;border-radius:6px;overflow:hidden;margin-top:10px">
  <div style="background:${isCorrect?'#d4edda':'#f8d7da'};padding:8px 14px;font-size:15px;font-weight:bold">
   ${isCorrect?'✅ BENAR':'❌ SALAH'}
  </div>
  ${translationBlock}
  ${chosenWrongBlock}
  ${correctBlock}
  ${remainingBlock}
 </div>`;
 draw();
}

function gotoQ(i){cur=i;draw();}
function pageNext(){if(start+10<qs.length){start+=10;renderNav();updateTopStats();}}
function pagePrev(){if(start-10>=0){start-=10;renderNav();updateTopStats();}}

function prevQ(){if(cur>0){cur--;if(cur<start)start-=10;draw();}}
function nextQ(){
 if(cur<qs.length-1){cur++;if(cur>=start+10)start+=10;draw();}
 else review();
}

function review(){
 const total=qs.length;
 const pct=Math.round(score/total*100);
 const pass=pct>=70;
 const keys=['A','B','C','D','E','F'];
 let h=`<div class='review-box'>
  <h2 style="color:#1a73e8;margin-bottom:16px">REVIEW ALL QUESTION</h2>`;

 qs.forEach((q,i)=>{
  const userAns=ans[i];
  const correct=q.a;
  const isCorrect=isCorrectAnswer(q, userAns);
  const unanswered=(userAns===undefined);

  let ansBlock='';
  if(unanswered){
   ansBlock=`<div style="color:#888;font-style:italic;margin-top:6px">Belum dijawab</div>
   <div style="margin-top:6px;background:#f0fff4;border-left:3px solid #28a745;padding:8px 12px">
    <b style="color:#28a745">✅ Jawaban Benar: ${correctLabel(q)}</b><br>
    <span style="font-size:13px;color:#333">${q.exp}</span>
   </div>`;
  } else if(isCorrect){
   ansBlock=`<div style="background:#f0fff4;border-left:3px solid #28a745;padding:8px 12px;margin-top:6px">
    <b style="color:#28a745">✅ Jawaban Anda Benar: ${correctLabel(q)}</b><br>
    <span style="font-size:13px;color:#333">${q.exp}</span>
   </div>`;
  } else {
   const wrongReason=q.w&&q.w[userAns]?q.w[userAns]:'Bukan jawaban yang paling tepat.';
   ansBlock=`
   <div style="background:#fff0f0;border-left:3px solid #dc3545;padding:8px 12px;margin-top:6px">
    <b style="color:#dc3545">❌ Jawaban Anda Salah: ${q.o[userAns]}</b><br>
    <span style="font-size:13px;color:#666">${wrongReason}</span>
   </div>
   <div style="background:#f0fff4;border-left:3px solid #28a745;padding:8px 12px;margin-top:6px">
    <b style="color:#28a745">✅ Jawaban Benar: ${correctLabel(q)}</b><br>
    <span style="font-size:13px;color:#333">${q.exp}</span>
   </div>`;
  }

  const reviewTransBlock=q.t?`<div style="background:#fffde7;border-left:3px solid #f9a825;padding:6px 10px;margin:4px 0 6px;border-radius:3px"><span style="font-size:11px;font-weight:bold;color:#f57f17">📝 Arti soal: </span><span style="font-size:12px;color:#555;font-style:italic">${q.t}</span></div>`:'';
  h+=`<div style="background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px;margin-bottom:14px">
   <div style="display:flex;align-items:flex-start;gap:10px">
    <div style="background:${isCorrect?'#28a745':unanswered?'#aaa':'#dc3545'};color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:13px">${i+1}</div>
    <div style="flex:1">
     <div style="font-weight:bold;font-size:14px;margin-bottom:2px">SOAL: ${q.q}</div>
     ${reviewTransBlock}
     ${ansBlock}
    </div>
   </div>
  </div>`;
 });

 h+=`<div style="text-align:center;padding:20px;background:${pass?'#d4edda':'#f8d7da'};border-radius:8px;margin-top:10px">
  <div style="font-size:22px;font-weight:bold;color:${pass?'#155724':'#721c24'}">
   NILAI AKHIR: ${score}/${total} &nbsp; (${pct}%)
  </div>
  <div style="font-size:16px;margin-top:8px;color:${pass?'#155724':'#721c24'}">
   ${pass?'🎉 LULUS — Passing Grade 70% Tercapai!':'😞 TIDAK LULUS — Passing Grade 70% Belum Tercapai'}
  </div>
  <div style="font-size:13px;color:#555;margin-top:6px">Passing Grade: 70% (${Math.ceil(total*0.7)} dari ${total} soal harus benar)</div>
 </div>
</div>`;
 document.getElementById("review").innerHTML=h;
 document.getElementById("review").scrollIntoView({behavior:'smooth'});
}
draw();
</script>
